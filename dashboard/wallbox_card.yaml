# Besen Wallbox BS20 — Home Assistant Dashboard-Kachel
#
# Dieses YAML kann direkt in ein bestehendes Lovelace-Dashboard eingefügt werden.
# Voraussetzung: evseMQTT Add-on läuft und MQTT Discovery ist aktiv.
#
# Entity-IDs basieren auf dem Serial der Wallbox.
# Ersetze "wallbox_evse_bs20" durch das tatsächliche Präfix deiner Entitäten
# (zu finden unter Einstellungen → Geräte & Dienste → MQTT → deine Wallbox).
#
# Einbinden als einzelne Kachel (vertical-stack) in ein bestehendes Dashboard:

type: vertical-stack
cards:

  # ── Status & Steuerung ────────────────────────────────────────────────────
  - type: glance
    title: Wallbox BS20
    show_name: true
    show_icon: true
    show_state: true
    columns: 3
    entities:
      - entity: switch.wallbox_evse_bs20_charge
        name: Laden
        icon: mdi:ev-plug-type2
      - entity: sensor.wallbox_evse_bs20_plug_state
        name: Stecker
        icon: mdi:power-plug
      - entity: sensor.wallbox_evse_bs20_status
        name: Status
        icon: mdi:information-outline
      - entity: sensor.wallbox_evse_bs20_message
        name: Meldung
        icon: mdi:message-text-outline
      - entity: sensor.wallbox_evse_bs20_error_state
        name: Fehler
        icon: mdi:alert-circle-outline
      - entity: sensor.wallbox_evse_bs20_temperature
        name: Temperatur
        icon: mdi:thermometer

  # ── Ladeleistung (Gauge) ──────────────────────────────────────────────────
  - type: gauge
    entity: sensor.wallbox_evse_bs20_current_energy
    name: Aktuelle Ladeleistung
    unit: W
    min: 0
    max: 11000
    needle: true
    segments:
      - from: 0
        color: "#44739e"   # blau   = kein / minimales Laden
      - from: 1380
        color: "#e8c439"   # gelb   = einphasig
      - from: 4600
        color: "#27ae60"   # grün   = dreiphasig / Vollast

  # ── Energie & Steuerung ───────────────────────────────────────────────────
  - type: entities
    entities:
      - entity: sensor.wallbox_evse_bs20_total_energy
        name: Gesamtenergie (Lifetime)
        icon: mdi:counter
      - type: divider
      - entity: number.wallbox_evse_bs20_charge_amps
        name: Max. Ladestrom
        icon: mdi:current-ac

  # ── Phasendaten ───────────────────────────────────────────────────────────
  - type: entities
    title: Phasen L1 / L2 / L3
    entities:
      - entity: sensor.wallbox_evse_bs20_l1_voltage
        name: L1 — Spannung
        icon: mdi:sine-wave
      - entity: sensor.wallbox_evse_bs20_l1_amperage
        name: L1 — Strom
        icon: mdi:current-ac
      - type: divider
      - entity: sensor.wallbox_evse_bs20_l2_voltage
        name: L2 — Spannung
        icon: mdi:sine-wave
      - entity: sensor.wallbox_evse_bs20_l2_amperage
        name: L2 — Strom
        icon: mdi:current-ac
      - type: divider
      - entity: sensor.wallbox_evse_bs20_l3_voltage
        name: L3 — Spannung
        icon: mdi:sine-wave
      - entity: sensor.wallbox_evse_bs20_l3_amperage
        name: L3 — Strom
        icon: mdi:current-ac
