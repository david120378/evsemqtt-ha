# Besen Wallbox BS20 — Einbettbare Lovelace-Karte
#
# Dashboard-Editor → Karte hinzufügen → Manuell → dieses YAML einfügen
#
# Voraussetzungen: Mushroom Cards via HACS installiert
#
# Entity-IDs basieren auf dem Serial der Wallbox.
# Ersetze "wallbox_evse_bs20" durch das tatsächliche Präfix deiner Entitäten
# (Einstellungen → Geräte & Dienste → MQTT → deine Wallbox).

square: false
type: grid
columns: 1
cards:

  # Steuerung — Manuell / Überschuss / Laden ein-aus
  - type: custom:mushroom-chips-card
    alignment: center
    chips:
      - type: template
        content: Manuell
        icon: mdi:hand-back-right
        icon_color: >
          {{ 'blue' if is_state('input_select.wallbox_modus', 'Manuell') else 'grey' }}
        tap_action:
          action: call-service
          service: input_select.select_option
          target:
            entity_id: input_select.wallbox_modus
          data:
            option: Manuell
      - type: template
        content: Überschuss
        icon: mdi:solar-power
        icon_color: >
          {{ 'green' if is_state('input_boolean.uberschussladen', 'on') else 'grey' }}
        tap_action:
          action: toggle
        entity: input_boolean.uberschussladen
      - type: template
        entity: switch.wallbox_evse_bs20_charge
        icon: mdi:ev-station
        icon_color: >-
          {{ 'green' if is_state('switch.wallbox_evse_bs20_charge', 'on') else 'red' }}
        tap_action:
          action: toggle
        hold_action:
          action: more-info
        content: >-
          {{ 'An' if is_state('switch.wallbox_evse_bs20_charge', 'on') else 'Aus' }}

  # Tesla — nur sichtbar wenn angeschlossen
  - type: conditional
    conditions:
      - condition: state
        entity: binary_sensor.flash_charger
        state: "on"
    card:
      type: custom:mushroom-template-card
      primary: Tesla
      secondary: "{{ states('sensor.flash_battery') }} %"
      picture: /local/pictures/Tesla.png
      entity: sensor.flash_battery
      tap_action:
        action: more-info
      features_position: bottom
      multiline_secondary: false

  # Aceman — nur sichtbar wenn angeschlossen
  - type: conditional
    conditions:
      - condition: state
        entity: sensor.aceman_e_charging_port_plug_state
        state: Connected
    card:
      type: custom:mushroom-template-card
      primary: Mini Aceman
      secondary: "{{ states('sensor.aceman_e_battery_hv_state_of_charge') }} %"
      picture: /local/pictures/Aceman.png
      entity: sensor.aceman_e_battery_hv_state_of_charge
      tap_action:
        action: more-info

  # Aktuelle Ladeleistung — Gauge
  - type: gauge
    entity: sensor.wallbox_evse_bs20_current_energy
    name: Aktuelle Ladeleistung
    unit: W
    min: 0
    max: 11000
    needle: false
    segments:
      - from: 0
        color: "#44739e"   # blau  = kein Laden
      - from: 1380
        color: "#e8c439"   # gelb  = einphasig
      - from: 4600
        color: "#27ae60"   # grün  = dreiphasig / Vollast

  # Max. Ladestrom — Schieberegler
  - type: tile
    entity: number.wallbox_evse_bs20_charge_amps
    name: Max. Ladestrom
    icon: mdi:current-ac
    vertical: false
    features:
      - type: numeric-input
        style: slider
    features_position: inline

  # Notfall-Laden SOC Schwellwert Start
  - type: tile
    entity: input_number.wallbox_soc_schwellwert
    name: Schwellwert Start
    icon: mdi:battery-80
    color: green
    vertical: false
    features:
      - type: numeric-input
        style: slider
    features_position: inline

  # Notfall-Laden SOC Schwellwert Stopp
  - type: tile
    entity: input_number.wallbox_soc_schwellwert_stopp
    name: Schwellwert Stopp
    icon: mdi:battery-50
    color: yellow
    vertical: false
    features:
      - type: numeric-input
        style: slider
    features_position: inline

grid_options:
  rows: auto
