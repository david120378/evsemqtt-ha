# Besen Wallbox BS20 — Einbettbare Lovelace-Karte
#
# Dashboard-Editor → Karte hinzufügen → Manuell → dieses YAML einfügen
#
# Voraussetzungen: Mushroom Cards und card-mod via HACS installiert
#
# Entity-IDs basieren auf dem Serial der Wallbox.
# Ersetze "wallbox_evse_bs20" durch das tatsächliche Präfix deiner Entitäten
# (Einstellungen → Geräte & Dienste → MQTT → deine Wallbox).

square: false
type: grid
columns: 2
cards:

  # Laden — Schalter
  - type: tile
    entity: switch.wallbox_evse_bs20_charge
    name: Laden
    icon: mdi:ev-plug-type2
    color: green

  # Aktuelle Ladeleistung — Gauge
  - type: gauge
    entity: sensor.wallbox_evse_bs20_current_energy
    name: Aktuelle Ladeleistung
    unit: W
    min: 0
    max: 11000
    needle: false
    segments:
      - from: 0
        color: "#44739e"   # blau  = kein Laden
      - from: 1380
        color: "#e8c439"   # gelb  = einphasig
      - from: 4600
        color: "#27ae60"   # grün  = dreiphasig / Vollast

  # Max. Ladestrom — Schieberegler
  - type: tile
    entity: number.wallbox_evse_bs20_charge_amps
    name: Max. Ladestrom
    icon: mdi:current-ac
    features:
      - type: numeric-input
        style: slider

  # Lademodus — Off / Manuell / Überschussladen
  - type: custom:mushroom-chips-card
    alignment: center
    chips:
      - type: template
        content: "Off"
        icon: mdi:power-off
        icon_color: >
          {{ 'red' if is_state('input_select.wallbox_modus', 'Off') else 'grey' }}
        tap_action:
          action: call-service
          service: input_select.select_option
          target:
            entity_id: input_select.wallbox_modus
          data:
            option: "Off"
      - type: template
        content: Manuell
        icon: mdi:hand-back-right
        icon_color: >
          {{ 'blue' if is_state('input_select.wallbox_modus', 'Manuell') else 'grey' }}
        tap_action:
          action: call-service
          service: input_select.select_option
          target:
            entity_id: input_select.wallbox_modus
          data:
            option: Manuell
      - type: template
        content: Überschuss
        icon: mdi:solar-power
        icon_color: >
          {{ 'green' if is_state('input_select.wallbox_modus', 'Überschussladen') else 'grey' }}
        tap_action:
          action: call-service
          service: input_select.select_option
          target:
            entity_id: input_select.wallbox_modus
          data:
            option: Überschussladen

  # Fahrzeug-Chips — Tesla & Aceman (nur wenn angeschlossen)
  - type: custom:mushroom-chips-card
    alignment: center
    card_mod:
      style:
        mushroom-chips-card$: |
          mushroom-template-chip {
            --chip-height: 60px;
          }
        mushroom-chips-card$ mushroom-template-chip$: |
          img {
            width: 52px !important;
            height: 52px !important;
            border-radius: 50%;
            object-fit: cover;
          }
    chips:
      - type: conditional
        conditions:
          - condition: state
            entity: binary_sensor.flash_charger
            state: "on"
        chip:
          type: template
          picture: /local/pictures/Tesla.png
          entity: sensor.flash_battery
          tap_action:
            action: more-info
      - type: conditional
        conditions:
          - condition: state
            entity: sensor.aceman_e_charging_port_plug_state
            state: Connected
        chip:
          type: template
          picture: /local/pictures/Aceman.png
          entity: sensor.aceman_e_battery_hv_state_of_charge
          tap_action:
            action: more-info
