# Besen Wallbox BS20 — Einbettbare Lovelace-Karte
#
# Dashboard-Editor → Karte hinzufügen → Manuell → dieses YAML einfügen
#
# Entity-IDs basieren auf dem Serial der Wallbox.
# Ersetze "wallbox_evse_bs20" durch das tatsächliche Präfix deiner Entitäten
# (Einstellungen → Geräte & Dienste → MQTT → deine Wallbox).

type: grid
columns: 2
square: false
cards:

  - type: tile
    entity: switch.wallbox_evse_bs20_charge
    name: Laden
    icon: mdi:ev-plug-type2
    color: green

  - type: gauge
    entity: sensor.wallbox_evse_bs20_current_energy
    name: Aktuelle Ladeleistung
    unit: W
    min: 0
    max: 11000
    needle: true
    segments:
      - from: 0
        color: "#44739e"   # blau  = kein / minimales Laden
      - from: 1380
        color: "#e8c439"   # gelb  = einphasig
      - from: 4600
        color: "#27ae60"   # grün  = dreiphasig / Vollast

  - type: tile
    entity: sensor.wallbox_evse_bs20_plug_state
    name: Stecker
    icon: mdi:power-plug

  - type: tile
    entity: sensor.wallbox_evse_bs20_error_state
    name: Fehler
    icon: mdi:alert-circle-outline
    color: red

  - type: tile
    entity: number.wallbox_evse_bs20_charge_amps
    name: Max. Ladestrom
    icon: mdi:current-ac
    features:
      - type: numeric-input
        style: slider

  - type: custom:mushroom-chips-card
    chips:
      - type: template
        content: Off
        icon: mdi:power-off
        icon_color: >
          {{ 'red' if is_state('input_select.wallbox_modus', 'Off') else 'grey' }}
        tap_action:
          action: call-service
          service: input_select.select_option
          target:
            entity_id: input_select.wallbox_modus
          data:
            option: Off
      - type: template
        content: Manuell
        icon: mdi:hand-back-right
        icon_color: >
          {{ 'blue' if is_state('input_select.wallbox_modus', 'Manuell') else 'grey' }}
        tap_action:
          action: call-service
          service: input_select.select_option
          target:
            entity_id: input_select.wallbox_modus
          data:
            option: Manuell
      - type: template
        content: Überschuss
        icon: mdi:solar-power
        icon_color: >
          {{ 'green' if is_state('input_select.wallbox_modus', 'Überschussladen') else 'grey' }}
        tap_action:
          action: call-service
          service: input_select.select_option
          target:
            entity_id: input_select.wallbox_modus
          data:
            option: Überschussladen
