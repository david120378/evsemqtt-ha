# Besen Wallbox BS20 — Einbettbare Lovelace-Karte (Bubble Card)
#
# Dashboard-Editor → Karte hinzufügen → Manuell → dieses YAML einfügen
#
# Voraussetzung: Bubble Card via HACS installiert (Clooos/Bubble-Card)
#
# Entity-IDs basieren auf dem Serial der Wallbox.
# Ersetze "wallbox_evse_bs20" durch das tatsächliche Präfix deiner Entitäten
# (Einstellungen → Geräte & Dienste → MQTT → deine Wallbox).

type: grid
columns: 2
square: false
cards:

  # Laden — Schalter
  - type: custom:bubble-card
    card_type: button
    entity: switch.wallbox_evse_bs20_charge
    name: Laden
    icon: mdi:ev-plug-type2

  # Aktuelle Ladeleistung
  - type: custom:bubble-card
    card_type: button
    entity: sensor.wallbox_evse_bs20_current_energy
    name: Ladeleistung
    icon: mdi:lightning-bolt

  # Stecker-Status
  - type: custom:bubble-card
    card_type: button
    entity: sensor.wallbox_evse_bs20_plug_state
    name: Stecker
    icon: mdi:power-plug

  # Fehlerstatus
  - type: custom:bubble-card
    card_type: button
    entity: sensor.wallbox_evse_bs20_error_state
    name: Fehler
    icon: mdi:alert-circle-outline

  # Max. Ladestrom — Bubble Card zeigt Slider automatisch für number-Entitäten
  - type: custom:bubble-card
    card_type: button
    entity: number.wallbox_evse_bs20_charge_amps
    name: Max. Ladestrom
    icon: mdi:current-ac

  # Lademodus — Tippen öffnet nativen HA-Select-Dialog
  - type: custom:bubble-card
    card_type: button
    entity: input_select.wallbox_modus
    name: Lademodus
    icon: mdi:ev-station
