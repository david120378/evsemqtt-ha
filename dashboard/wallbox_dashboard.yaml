# Besen Wallbox BS20 — Vollständiges Home Assistant Dashboard
#
# Dieses Dashboard kann über den HA-Dashboard-Editor als neues Dashboard angelegt werden,
# oder per Raw-Konfiguration eingefügt werden.
#
# Entity-IDs basieren auf dem Serial der Wallbox.
# Ersetze "wallbox_evse_bs20" durch das tatsächliche Präfix deiner Entitäten
# (zu finden unter Einstellungen → Geräte & Dienste → MQTT → deine Wallbox).

title: Wallbox
views:
  - title: Wallbox
    path: main
    type: sections
    max_columns: 2
    sections:

      # ── Status & Steuerung ─────────────────────────────────────────────────
      - type: grid
        title: Status & Steuerung
        cards:
          - type: tile
            entity: switch.wallbox_evse_bs20_charge
            name: Laden
            icon: mdi:ev-plug-type2
            color: green
            grid_options:
              columns: 6
              rows: 2

          - type: tile
            entity: sensor.wallbox_evse_bs20_plug_state
            name: Stecker
            icon: mdi:power-plug
            grid_options:
              columns: 6
              rows: 1

          - type: tile
            entity: sensor.wallbox_evse_bs20_status
            name: Status
            icon: mdi:information-outline
            grid_options:
              columns: 6
              rows: 1

          - type: tile
            entity: sensor.wallbox_evse_bs20_error_state
            name: Fehler
            icon: mdi:alert-circle-outline
            color: red
            grid_options:
              columns: 6
              rows: 1

          - type: tile
            entity: sensor.wallbox_evse_bs20_message
            name: Meldung
            icon: mdi:message-text-outline
            grid_options:
              columns: 6
              rows: 1

      # ── Leistung & Energie ─────────────────────────────────────────────────
      - type: grid
        title: Leistung & Energie
        cards:
          - type: gauge
            entity: sensor.wallbox_evse_bs20_current_energy
            name: Aktuelle Ladeleistung
            unit: W
            min: 0
            max: 11000
            needle: true
            segments:
              - from: 0
                color: "#44739e"   # blau  = kein / minimales Laden
              - from: 1380
                color: "#e8c439"   # gelb  = einphasig
              - from: 4600
                color: "#27ae60"   # grün  = dreiphasig / Vollast
            grid_options:
              columns: 12
              rows: 3

          - type: tile
            entity: sensor.wallbox_evse_bs20_total_energy
            name: Gesamtenergie
            icon: mdi:counter
            grid_options:
              columns: 6
              rows: 2

          - type: tile
            entity: sensor.wallbox_evse_bs20_temperature
            name: Innentemperatur
            icon: mdi:thermometer
            grid_options:
              columns: 6
              rows: 2

          - type: tile
            entity: number.wallbox_evse_bs20_charge_amps
            name: Max. Ladestrom
            icon: mdi:current-ac
            grid_options:
              columns: 12
              rows: 2

      # ── Phasendaten ────────────────────────────────────────────────────────
      - type: grid
        title: Phasen L1 / L2 / L3
        cards:
          - type: tile
            entity: sensor.wallbox_evse_bs20_l1_voltage
            name: L1 Spannung
            icon: mdi:sine-wave
            grid_options:
              columns: 4
              rows: 1

          - type: tile
            entity: sensor.wallbox_evse_bs20_l2_voltage
            name: L2 Spannung
            icon: mdi:sine-wave
            grid_options:
              columns: 4
              rows: 1

          - type: tile
            entity: sensor.wallbox_evse_bs20_l3_voltage
            name: L3 Spannung
            icon: mdi:sine-wave
            grid_options:
              columns: 4
              rows: 1

          - type: tile
            entity: sensor.wallbox_evse_bs20_l1_amperage
            name: L1 Strom
            icon: mdi:current-ac
            grid_options:
              columns: 4
              rows: 1

          - type: tile
            entity: sensor.wallbox_evse_bs20_l2_amperage
            name: L2 Strom
            icon: mdi:current-ac
            grid_options:
              columns: 4
              rows: 1

          - type: tile
            entity: sensor.wallbox_evse_bs20_l3_amperage
            name: L3 Strom
            icon: mdi:current-ac
            grid_options:
              columns: 4
              rows: 1
