# Wallbox Watchdog – Add-on Neustart bei Verbindungsverlust
#
# Startet das evseMQTT Add-on automatisch neu wenn der Wallbox-Sensor
# länger als 20 Minuten kein MQTT-Update bekommen hat oder unavailable ist.
#
# Hintergrund:
#   Die Wallbox sendet UDP-Pakete alle ~15 s. Das Addon publiziert diese
#   als MQTT-State-Updates. Kommt 20 Minuten kein Update mehr durch, ist
#   die UDP-Verbindung unterbrochen und ein Neustart hilft.
#
#   Sobald expire_after=90s aktiv ist (nach einem erfolgreichen Addon-Start
#   mit frischen Discovery-Configs), kann alternativ der einfachere
#   state-Trigger (to: unavailable, for: 5 min) verwendet werden.

alias: "Wallbox Watchdog – Add-on Neustart bei Verbindungsverlust"
description: >
  Startet das evseMQTT Add-on neu wenn der Wallbox-Sensor länger als
  20 Minuten kein MQTT-Update hatte oder unavailable ist.
mode: single
trigger:
  - platform: time_pattern
    minutes: "/10"
condition:
  - condition: template
    value_template: >
      {{ is_state('sensor.wallbox_evse_bs20_status', 'unavailable') or
         (now() - states.sensor.wallbox_evse_bs20_status.last_updated).total_seconds() > 1200 }}
action:
  - data:
      # ACHTUNG: Der Addon-Slug ist instanzspezifisch!
      # Den eigenen Slug finden unter:
      # Einstellungen → Addons → Besen Wallbox WiFi (UDP) → Info → Slug
      # Oder in der HA-URL wenn das Addon geöffnet ist:
      # /hassio/addon/DEIN_SLUG/info
      addon: b043d8c5_evsemqtt
    action: hassio.addon_restart
