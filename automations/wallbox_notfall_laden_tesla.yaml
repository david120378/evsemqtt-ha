# Wallbox: Notfall-Laden (Tesla)
#
# Startet Notfall-Laden mit erhöhtem Strom wenn der Tesla-SOC unter den
# Schwellwert fällt und das Fahrzeug angeschlossen ist.
# Basiert auf dem Blueprint: david120378/wallbox_notfall.yaml

alias: "Wallbox: Notfall-Laden (Tesla)"
use_blueprint:
  path: david120378/wallbox_notfall.yaml
  input:
    wallbox_switch: switch.wallbox_evse_bs20_charge
    wallbox_charge_amps: number.wallbox_evse_bs20_charge_amps
    plug_state_sensor: sensor.wallbox_evse_bs20_plug_state
    car_soc_sensor: sensor.flash_battery
    car_plug_sensor: binary_sensor.flash_charger
    notfall_amps: 16
